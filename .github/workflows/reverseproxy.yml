name: CI - udagram-api-reverseproxy

on:
  push:
    paths:
      - "udagram-api-reverseproxy/**"
  pull_request:
    paths:
      - "udagram-api-reverseproxy/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        working-directory: udagram-api-reverseproxy
        run: npm install

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/udagram-api-reverseproxy:latest udagram-api-reverseproxy

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/udagram-api-reverseproxy:latest
